name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1
    - name: Setup Crystal env
      run: crystal env | Select-String 'CRYSTAL_LIBRARY_PATH' >> $env:GITHUB_ENV
    - name: Set up Visual Studio shell
      uses: egor-tensin/vs-shell@v2
      with:
        arch: x64
    - name: Install dependencies
      run: shards install
    - name: Run release build
      run: shards build --release
    - name: Package Windows
      run: |
        mkdir dist
        copy bin\* dist\
        copy README.md dist\
        copy LICENSE dist\
        Compress-Archive -Path dist\* -DestinationPath rosegold-windows-x64.zip
    - uses: actions/upload-artifact@v4
      with:
        name: windows-bin
        path: rosegold-windows-x64.zip

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: crystal-lang/install-crystal@v1
    - run: shards install
    - run: shards build --release
    - name: Package Linux x64
      run: tar -czvf rosegold-linux-x64.tar.gz bin/ README.md LICENSE
    - uses: actions/upload-artifact@v4
      with:
        name: linux-x64-bin
        path: rosegold-linux-x64.tar.gz

  build-linux-arm64:
  runs-on: ubuntu-latest
  steps:
  - uses: actions/checkout@v4

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Build in Crystal Alpine container (native ARM64 buildx)
    run: |
      docker buildx build \
        --platform linux/arm64 \
        --output type=local,dest=./output \
        --file - . <<'EOF'
      FROM arm64v8/alpine:latest
      RUN echo "https://dl-cdn.alpinelinux.org/alpine/edge/main" >> /etc/apk/repositories && \
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/community" >> /etc/apk/repositories && \
          apk update && \
          apk add --no-cache crystal shards git build-base \
            openssl-dev openssl-libs-static \
            zlib-dev zlib-static \
            yaml-dev yaml-static \
            gmp-dev pcre2-dev gc-dev \
            libevent-dev libevent-static \
            musl-dev zip && \
          # Compile missing static libs natively inside ARM64 container
          apk add --no-cache automake autoconf libtool && \
          wget -q https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz && \
          tar xf gmp-6.3.0.tar.xz && cd gmp-6.3.0 && \
          ./configure --enable-static --disable-shared --prefix=/usr && \
          make -j$(nproc) && make install && cd / && \
          wget -q https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.44/pcre2-10.44.tar.gz && \
          tar xf pcre2-10.44.tar.gz && cd pcre2-10.44 && \
          ./configure --enable-static --disable-shared --enable-pcre2-8 --prefix=/usr && \
          make -j$(nproc) && make install && cd / && \
          wget -q https://github.com/ivmai/bdwgc/releases/download/v8.2.6/gc-8.2.6.tar.gz && \
          tar xf gc-8.2.6.tar.gz && cd gc-8.2.6 && \
          ./configure --enable-static --disable-shared --prefix=/usr && \
          make -j$(nproc) && make install && cd /
      WORKDIR /app
      COPY . .
      RUN shards install && \
          LDFLAGS="-Wl,-z,max-page-size=65536 -Wl,-z,common-page-size=65536" \
          shards build --static && \
          zip -r rosegold-linux-arm64.zip bin/ README.md LICENSE
      FROM scratch
      COPY --from=0 /app/rosegold-linux-arm64.zip /
      EOF

  - uses: actions/upload-artifact@v4
    with:
      name: linux-arm64-bin
      path: output/rosegold-linux-arm64.zip
  create-release:
    needs: [build-windows, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/download-artifact@v4
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        draft: false
        prerelease: false
        files: |
          windows-bin/rosegold-windows-x64.zip
          linux-x64-bin/rosegold-linux-x64.tar.gz
          linux-arm64-bin/rosegold-linux-arm64.zip