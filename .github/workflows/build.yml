name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1
    - name: Setup Crystal env
      run: crystal env | Select-String 'CRYSTAL_LIBRARY_PATH' >> $env:GITHUB_ENV
    - name: Set up Visual Studio shell
      uses: egor-tensin/vs-shell@v2
      with:
        arch: x64
    - name: Install dependencies
      run: shards install
    - name: Run release build
      run: shards build --release
    - name: Package Windows
      run: |
        mkdir dist
        copy bin\* dist\
        copy README.md dist\
        copy LICENSE dist\
        Compress-Archive -Path dist\* -DestinationPath rosegold-windows-x64.zip
    - uses: actions/upload-artifact@v4
      with:
        name: windows-bin
        path: rosegold-windows-x64.zip

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: crystal-lang/install-crystal@v1
    - run: shards install
    - run: shards build --release
    - name: Package Linux x64
      run: tar -czvf rosegold-linux-x64.tar.gz bin/ README.md LICENSE
    - uses: actions/upload-artifact@v4
      with:
        name: linux-x64-bin
        path: rosegold-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build ARM64 via Alpine Docker
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: alpine_latest
        githubToken: ${{ github.token }}
        install: |
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/main" >> /etc/apk/repositories
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/community" >> /etc/apk/repositories
          apk update
          apk add \
            crystal shards git build-base \
            openssl-dev openssl-libs-static \
            zlib-dev zlib-static \
            yaml-dev yaml-static \
            gmp-dev \
            pcre2-dev \
            gc-dev \
            libevent-dev libevent-static \
            musl-dev \
            zip
        run: |
          shards install
          LDFLAGS="-Wl,-z,max-page-size=65536 -Wl,-z,common-page-size=65536" shards build --static
          zip -r rosegold-linux-arm64.zip bin/ README.md LICENSE
    - uses: actions/upload-artifact@v4
      with:
        name: linux-arm64-bin
        path: rosegold-linux-arm64.zip
  create-release:
    needs: [build-windows, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/download-artifact@v4
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        draft: false
        prerelease: false
        files: |
          windows-bin/rosegold-windows-x64.zip
          linux-x64-bin/rosegold-linux-x64.tar.gz
          linux-arm64-bin/rosegold-linux-arm64.zip